name: Production Build & Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Silences the GitHub warning and updates the runner engine

jobs:
  audit-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 24  # Upgraded to the native Node 24 environment
        cache: 'npm'

    - name: Install Dependencies
      run: npm install --legacy-peer-deps

    - name: Compile Production Build
      env:
        VITE_API_BASE_URL: https://api.vellera.app/v1
      run: npx vite build

    - name: Upload Build Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: production-dist
        path: dist/
