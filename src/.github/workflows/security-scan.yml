name: Security Scan with Rafter

on:
  push:
    branches: [ main ]

jobs:
  security-scan-three:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security scan 🛡️
        env:
          # Use secrets for your API key
          RAFTER_API_KEY: ${{ secrets.RAFTER_API_KEY }}
        run: |
            set -euo pipefail

            # 1. Trigger scan
            SCAN_ID=$(curl -fsS -X POST               -H "Content-Type: application/json"               -H "x-api-key: ${{ secrets.RAFTER_API_KEY }}"               -d '{                "repository_name": "${{ github.repository }}",                "branch_name": "${{ github.ref_name }}",                "scan_mode": "fast"              }'               https://rafter.so/api/static/scan | jq -r '.scan_id')

            echo "SCAN_ID: $SCAN_ID"

            # 2. Wait for completion (polling), for a maximum of 10 minutes (60 loops × 10s = 600s = 10m)
            MAX_POLLS=60
            POLL_COUNT=0
            while [ $POLL_COUNT -lt $MAX_POLLS ]; do
              STATUS=$(curl -fsS -H "x-api-key: ${{ secrets.RAFTER_API_KEY }}"                 "https://rafter.so/api/static/scan?scan_id=$SCAN_ID" | jq -r '.status')
              
              if [ "$STATUS" = "completed" ] || [ "$STATUS" = "failed" ]; then
                break
              fi
              
              echo "Scan status: $STATUS (poll $((POLL_COUNT+1)) of $MAX_POLLS)"
              sleep 10
              POLL_COUNT=$((POLL_COUNT+1))
            done

            if [ "$STATUS" = "failed" ]; then
              echo "❌ Scan failed. Please try again."
              exit 1
            elif [ "$STATUS" != "completed" ]; then
              echo "❌ Scan did not complete within 10 minutes."
              exit 1
            fi

            # 3. Get results
            curl -fsS -H "x-api-key: ${{ secrets.RAFTER_API_KEY }}"               "https://rafter.so/api/static/scan?scan_id=$SCAN_ID" > scan-results.json

            curl -fsS -H "x-api-key: ${{ secrets.RAFTER_API_KEY }}"               "https://rafter.so/api/static/scan?scan_id=$SCAN_ID&format=md" > scan-results.md

      - name: Check for critical vulnerabilities 🧐
        run: |
          # Install jq if needed (usually present on ubuntu-latest)
          # sudo apt-get update && sudo apt-get install -y jq

          if [ ! -s scan-results.json ]; then
            echo "⚠️ Scan results file is empty or not found."
            exit 0 # Or exit 1 if an empty file is an error
          fi

          CRITICAL_COUNT=$(jq '.vulnerabilities | map(select(.severity=="error")) | length' scan-results.json)

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "❌ Found $CRITICAL_COUNT critical vulnerabilities!"
            echo "Please review the scan results and fix critical issues before merging."
            exit 1
          else
            echo "✅ No critical vulnerabilities found"
          fi

      - name: Upload scan results 📄
        uses: actions/upload-artifact@v4
        if: always() # Upload results even if vulnerabilities were found
        with:
          name: security-scan-results
          path: | 
            scan-results.json
            scan-results.md
          retention-days: 30